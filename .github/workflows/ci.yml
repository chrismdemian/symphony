name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      # Phase 7B — build + typecheck the workspace plugin packages
      # (@symphony/plugin-sdk and the in-repo example). Build first so the
      # example can typecheck against the SDK's emitted .d.ts.
      - run: pnpm build:packages
      - run: pnpm typecheck:packages
